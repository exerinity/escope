<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home / escope</title>
  <meta name="description"
    content="escope is a service for creating ephemeral, quick, self-destructing redirects ('scopes').">
  <meta name="theme-color" content="#6000ff">
  <meta property="og:type" content="website">
  <meta property="og:title" content="escope">
  <meta property="og:description"
    content="escope is a service for creating ephemeral, quick, self-destructing redirects ('scopes').">
  <meta property="og:image" content="/escope.png">
  <link rel="icon" href="/escope.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/escope.svg">
  <link rel="stylesheet" href="/frontend/stylesheets/main.css">
</head>

<body>
  <main>
    <div class="page-stack">
      <div class="grid">
      <section class="panel"><small id="welcome">Welcome to</small>
        <h1><span style="color: #6000ff">$</span> escope</h1>
        <form id="targ" autocomplete="off">
          <label for="targu">target</label>
          <input id="targu" name="url" required />

          <label for="ttr">minutes to expire (1-4320)</label>
          <input type="number" id="ttr" name="ttl" min="1" max="4320" value="5" required />

          <label for="slug-mode">slug mode</label>
          <select id="slug-mode" name="slugMode">
            <option value="letters">Random letters</option>
            <option value="numbers">Random numbers</option>
            <option value="alphanumeric" selected>Random letters and numbers</option>
            <option value="icons">Random icons</option>
            <option value="words">Random words</option>
          </select>

          <label for="remember-slug-mode" style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="remember-slug-mode" />
            remember slug mode
          </label>

          <button type="submit" id="create-button">
            <svg class="penis" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4 L12 20 M4 12 L20 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            Create scope
          </button>
        </form>
        <div class="status" id="stat"></div>
        <p><span style="text-decoration: none;" class="report"><u>E</u>phemeral <u>S</u>coped <u>C</u>ontrol <u>O</u>f <u>P</u>ersistent <u>E</u>ndpoints</span>
          <br><a class="report" href="/release_notes">v5</a> -
          <a class="report" href="/rules">Rules</a> -
          <a class="report" href="/privacy">Privacy policy</a> -
          <a class="report" href="/resolve">Resolve a scope</a>
          <br><a class="report" href="/about">About escope</a> -
          <a class="report" href="https://exerinity.com/" target="_blank">By exerinity</a> -
          <a class="report" href="https://exerinity.com/hello" target="_blank">contact</a>
        </p>
      </section>
      <section class="panel">
        <div class="actions">
          <h2>Your active scopes</h2>
          <button type="button" id="dall" aria-label="Destroy all" style="display:none;background-color:RED">destroy
            all</button>
          <button type="button" id="refr" aria-label="Refresh scopes">
            <svg xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 512 512"><!--!Font Awesome Free 7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
              <path fill="currentColor"
                d="M436.7 74.7L448 85.4 448 32c0-17.7 14.3-32 32-32s32 14.3 32 32l0 128c0 17.7-14.3 32-32 32l-128 0c-17.7 0-32-14.3-32-32s14.3-32 32-32l47.9 0-7.6-7.2c-.2-.2-.4-.4-.6-.6-75-75-196.5-75-271.5 0s-75 196.5 0 271.5 196.5 75 271.5 0c8.2-8.2 15.5-16.9 21.9-26.1 10.1-14.5 30.1-18 44.6-7.9s18 30.1 7.9 44.6c-8.5 12.2-18.2 23.8-29.1 34.7-100 100-262.1 100-362 0S-25 175 75 75c99.9-99.9 261.7-100 361.7-.3z" />
            </svg></button>
        </div>
        <div class="stat" id="lit"><span class="spinner" aria-label="loading" role="status"></span> Retrieving data...
        </div>
        <ul class="lis" id="lis"></ul>
      </section>
      </div>
      <div class="alert-banner" role="alert">
        <a href="https://github.com/exerinity/escope.cli" target="_blank">You can now use escope in a command line!</a> (arch: yay -S escope-git)
      </div>
    </div>
  </main>
  <script src="/frontend/scripts/miscellaneous.js"></script>
  <script src="/frontend/scripts/message.js"></script>
  <script src="/frontend/scripts/scoping.js"></script>
</body>

</html>
